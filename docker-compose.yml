# docker-compose.yml
# One-command startup: docker compose up --build
#
# Starts the Streamlit UI and optionally an Ollama sidecar for local LLM inference.
# For OpenAI/Anthropic, set the provider + key in .env and skip the ollama service.

services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - DATABASE_PATH=data/fintech.db
      - FAISS_INDEX_PATH=data/schema.faiss
      - FAISS_METADATA_PATH=data/schema_meta.pkl
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull a model on first start (adjust model name as needed):
    # docker compose exec ollama ollama pull llama3.1:8b
    restart: unless-stopped

  # Run tests without any external dependencies:
  tests:
    build: .
    command: pytest tests/ -v --tb=short --no-header
    profiles:
      - test
    environment:
      - LLM_PROVIDER=ollama
      - LLM_MODEL=test
      - DATABASE_PATH=data/fintech.db

volumes:
  ollama_data:
